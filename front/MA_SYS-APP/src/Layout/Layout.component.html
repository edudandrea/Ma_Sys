<div class="layout-shell">
  <aside
    class="sidebar"
    [class.collapsed]="sidebarCollapsed"
    [class.is-compact]="isCompactViewport"
  >
    <div class="sidebar-header">
      <button
        class="brand-mark"
        type="button"
        (click)="toggleSidebar()"
        [attr.aria-label]="sidebarCollapsed ? 'Expandir menu lateral' : 'Recolher menu lateral'"
      >
        <span class="brand-mark-text">MA</span>
        <i class="fa-solid fa-bars-staggered brand-mark-icon"></i>
      </button>

      <div class="brand-copy" *ngIf="!sidebarCollapsed">
        <strong>Marcial ProX</strong>
        <span>Gestão para artes marciais</span>
      </div>
    </div>

    <nav class="sidebar-nav" aria-label="Navegação principal">
      <a
        routerLink="/dashboard"
        routerLinkActive="active"
        data-label="Dashboard"
        [attr.title]="sidebarCollapsed ? 'Dashboard' : null"
      >
        <i class="fa-solid fa-chart-line"></i>
        <span *ngIf="!sidebarCollapsed">Dashboard</span>
      </a>

      <button
        class="menu-item"
        type="button"
        (click)="toggleCadastro()"
        [class.open]="cadastroOpen"
        data-label="Cadastros"
        [attr.title]="sidebarCollapsed ? 'Cadastros' : null"
      >
        <div class="menu-left">
          <i class="fa-solid fa-user-gear"></i>
          <span *ngIf="!sidebarCollapsed">Cadastros</span>
        </div>

        <i
          *ngIf="!sidebarCollapsed"
          class="fa-solid fa-chevron-down arrow"
          [class.open]="cadastroOpen"
        ></i>
      </button>

      <div class="submenu" *ngIf="cadastroOpen && !sidebarCollapsed">
        <a *ngIf="isAdmin()" routerLink="/academias" routerLinkActive="active">
          <i class="fa-solid fa-building"></i>
          <span>Academias</span>
        </a>

        <a routerLink="/alunos" routerLinkActive="active">
          <i class="fa-solid fa-circle-user"></i>
          <span>Alunos</span>
        </a>

        <a routerLink="/matriculas" routerLinkActive="active">
          <i class="fa-solid fa-money-bills"></i>
          <span>Matrículas</span>
        </a>

        <a routerLink="/professores" routerLinkActive="active">
          <i class="fa-solid fa-chalkboard-user"></i>
          <span>Professores</span>
        </a>

        <a routerLink="/modalidades" routerLinkActive="active">
          <i class="fa-solid fa-dumbbell"></i>
          <span>Modalidades</span>
        </a>
      </div>

      <button
        class="menu-item"
        type="button"
        (click)="toggleFinanceiro()"
        [class.open]="financeiroOpen"
        data-label="Financeiro"
        [attr.title]="sidebarCollapsed ? 'Financeiro' : null"
      >
        <div class="menu-left">
          <i class="fa-solid fa-money-bill-wave"></i>
          <span *ngIf="!sidebarCollapsed">Financeiro</span>
        </div>

        <i
          *ngIf="!sidebarCollapsed"
          class="fa-solid fa-chevron-down arrow"
          [class.open]="financeiroOpen"
        ></i>
      </button>

      <div class="submenu" *ngIf="financeiroOpen && !sidebarCollapsed">
        <a routerLink="/planos" routerLinkActive="active">
          <i class="fa-solid fa-layer-group"></i>
          <span>Planos</span>
        </a>

        <a routerLink="/pagamentos" routerLinkActive="active">
          <i class="fa-solid fa-credit-card"></i>
          <span>Pagamentos</span>
        </a>
      </div>

      <a
        *ngIf="isAdmin()"
        routerLink="/usuarios"
        routerLinkActive="active"
        data-label="Usuários"
        [attr.title]="sidebarCollapsed ? 'Usuários' : null"
      >
        <i class="fa-solid fa-users"></i>
        <span *ngIf="!sidebarCollapsed">Usuários</span>
      </a>
    </nav>

    <div class="sidebar-footer" *ngIf="!sidebarCollapsed">
      <span class="sidebar-footer-label">Academia ativa</span>
      <strong>{{ academiaNome }}</strong>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-copy">
        <span class="eyebrow">Painel operacional</span>
        <strong>{{ academiaNome }}</strong>
      </div>

      <div class="topbar-right">
        <label class="theme-picker" aria-label="Selecionar tema visual">
          <i class="fa-solid fa-palette"></i>
          <select [ngModel]="currentTheme" (ngModelChange)="changeTheme($event)">
            <option *ngFor="let theme of themeOptions" [ngValue]="theme.value">
              {{ theme.label }}
            </option>
          </select>
        </label>

        <div class="user-info">
          <div class="user-text">
            <span class="user-name">{{ userName }}</span>
            <span class="user-academia">{{ academiaNome }}</span>
          </div>

          <div class="avatar">
            {{ userName?.charAt(0) }}
          </div>
        </div>

        <button class="btn-logout" type="button" (click)="logout()" aria-label="Sair">
          <i class="fa-solid fa-right-from-bracket"></i>
        </button>
      </div>
    </header>

    <main class="content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
