<div class="page-header">
  <div class="page-title-group">
    <h1>Planos</h1>
    <p>Gerencie os planos da academia</p>
  </div>
</div>

<div class="planos-page">
  <div class="plano-grid">
    <div class="empty-state" *ngIf="!planos || planos.length === 0">
      <i class="fa-solid fa-user-slash"></i>
      <p>Nenhum plano cadastrado</p>
    </div>
    <div class="plano-card" *ngFor="let plano of planos">
      <!-- MENU -->
      <div class="card-menu">
        <button class="menu-btn" (click)="toggleMenu(plano, $event)">
          <i class="fa-solid fa-ellipsis"></i>
        </button>

        <div class="menu-dropdown" *ngIf="plano.menuAberto">
          <button *ngIf="editarId !== plano.id" --(click)="editarPlano(plano)">
            <i class="fa-solid fa-pen"></i>
            Editar
          </button>

          <button *ngIf="editarId === plano.id" --(click)="salvarEdicao(plano)">
            <i class="fa-solid fa-check"></i>
            Salvar
          </button>

          <button class="danger" (click)="excluirPlano(plano.id)">
            <i class="fa-solid fa-trash"></i>
            Excluir
          </button>
        </div>
      </div>

      <!-- HEADER CENTRALIZADO -->
      <div class="card-header-center">
        <div class="avatar">
          {{ getInicial(plano.nome) }}
        </div>

        <div class="plano-title">
          <span *ngIf="editarId !== plano.id">
            {{ plano.nome }}
          </span>

          <input *ngIf="editarId === plano.id" [(ngModel)]="nome" class="edit-input" />
        </div>
      </div>

      <!-- BODY -->
      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <i class="fa-solid fa-building"></i>
            <span>{{ plano.academiaNome }}</span>
          </div>

          <div class="info-item">
            <i class="fa-solid fa-building"></i>
            <span>{{ plano.valor }}</span>
          </div>

          <div class="info-item">
            <i class="fa-solid fa-award"></i>
            <span>{{ plano.duracaoMeses }}</span>
          </div>          
        </div>
      </div>

      <!-- FOOTER -->
      <div class="card-footer">
        <span class="alunos-count">
          <i class="fa-solid fa-users"></i>
          {{ plano.totalAlunos || 0 }} alunos
        </span>

        <span
          class="status clickable"
          [class.ativo]="plano.ativo"
          [class.inativo]="!plano.ativo"
          (click)="toggleStatus(plano)"
        >
          {{ plano.ativo ? 'Ativo' : 'Inativo' }}
        </span>
      </div>
    </div>
  </div>
</div>

<!-- BOTÃO FLUTUANTE -->

<button class="floating-add" (click)="openModalNovoPlano(templateNovoPlano)">
  <i class="fa-solid fa-plus"></i>
  <span class="fab-text"> Novo Plano </span>
</button>

<ng-template #templateNovoPlano>
  <div class="modal-content">
    <!-- HEADER -->
    <div class="modal-header">
      <h4>Novo Plano</h4>
      <button type="button" class="btn-close" (click)="modalRef?.hide()"></button>
    </div>

    <!-- BODY -->
    <div class="modal-body">
      <form class="form-grid">
        <!-- NOME (FULL) -->
        <div class="form-group full">
          <label>Nome</label>
          <input [(ngModel)]="nome" name="nome" />
        </div>

        <!-- GRADUAÇÃO -->
        <div class="form-group">
          <label>Valor</label>
          <input [(ngModel)]="valor" name="valor" />
        </div>

        <!-- EMAIL -->
        <div class="form-group">
          <label>Duração (meses)</label>
          <input [(ngModel)]="duracaoMeses" name="duracaoMeses" />
        </div>                  
      </form>
    </div>

    <!-- FOOTER -->
    <div class="modal-footer form-actions">
      <button class="btn-cancel" (click)="modalRef?.hide()">Cancelar</button>
      <button class="btn-save" (click)="novoPlano()">Salvar Plano</button>
    </div>
  </div>
</ng-template>
